<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WEALTHFLOW · Ahorro inteligente</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/2489/2489756.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* ===== TEMAS COMPLETOS ===== */
        /* Tema oscuro (negro y blanco) */
        body.dark-mode {
            --bg: #000000;
            --card: #111111;
            --primary: #ffffff;
            --secondary: #cccccc;
            --text: #ffffff;
            --text-dim: #888888;
            --border: rgba(255,255,255,0.15);
            --nav-bg: rgba(0,0,0,0.95);
            --toast-bg: #000000;
            --accent-glow: #ffffff;
            --scroll-thumb: #ffffff;
            --stat-bg: #1a1a1a;
            --star-color: #ffffff;
        }
        /* Tema claro (blanco y negro) */
        body.light-mode {
            --bg: #ffffff;
            --card: #f5f5f5;
            --primary: #000000;
            --secondary: #333333;
            --text: #000000;
            --text-dim: #555555;
            --border: rgba(0,0,0,0.1);
            --nav-bg: rgba(255,255,255,0.98);
            --toast-bg: #ffffff;
            --accent-glow: #000000;
            --scroll-thumb: #000000;
            --stat-bg: #e9e9e9;
            --star-color: #000000;
        }
        /* Tema azul */
        body.theme-blue {
            --bg: #eef4ff;
            --card: #ffffff;
            --primary: #1e88e5;
            --secondary: #42a5f5;
            --text: #1a1e2b;
            --text-dim: #546e7a;
            --border: #bbdefb;
            --nav-bg: #ffffffee;
            --scroll-thumb: #1e88e5;
            --stat-bg: #e3f2fd;
            --star-color: #1e88e5;
            --accent-glow: #1e88e5;
        }
        /* Tema morado */
        body.theme-purple {
            --bg: #1e1629;
            --card: #2e1f3c;
            --primary: #c084fc;
            --secondary: #d8b4fe;
            --text: #f3eaff;
            --text-dim: #b8a2c9;
            --border: #6b4b8a;
            --nav-bg: #2e1f3ce6;
            --scroll-thumb: #c084fc;
            --stat-bg: #3a2a4e;
            --star-color: #c084fc;
            --accent-glow: #c084fc;
        }
        /* Tema rosa */
        body.theme-pink {
            --bg: #2d1c2a;
            --card: #442b3a;
            --primary: #f472b6;
            --secondary: #f9a8d4;
            --text: #fff0f7;
            --text-dim: #d6b0c4;
            --border: #a75f7c;
            --nav-bg: #442b3ad9;
            --scroll-thumb: #f472b6;
            --stat-bg: #5a3a4e;
            --star-color: #f472b6;
            --accent-glow: #f472b6;
        }
        /* Tema rojo */
        body.theme-red {
            --bg: #1e0f0f;
            --card: #2e1a1a;
            --primary: #ef4444;
            --secondary: #f87171;
            --text: #fff0f0;
            --text-dim: #d4a6a6;
            --border: #b91c1c60;
            --nav-bg: #2e1a1ae6;
            --scroll-thumb: #ef4444;
            --stat-bg: #4a2a2a;
            --star-color: #ef4444;
            --accent-glow: #ef4444;
        }
        /* Tema naranja */
        body.theme-orange {
            --bg: #1f140a;
            --card: #332013;
            --primary: #f97316;
            --secondary: #fb923c;
            --text: #fff3e6;
            --text-dim: #d9b38c;
            --border: #b85b1a60;
            --nav-bg: #332013e6;
            --scroll-thumb: #f97316;
            --stat-bg: #4a2e1a;
            --star-color: #f97316;
            --accent-glow: #f97316;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); 
            min-height: 100vh; transition: background 0.2s, color 0.2s;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }

        .app-wrapper {
            width: 1300px; max-width: 100%;
            margin: 0 auto;
            padding: 0 24px 100px 24px;
            position: relative;
        }

        /* HEADER FIJO */
        .main-header {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 2px solid var(--primary);
            margin-bottom: 28px;
            background: var(--bg);
            backdrop-filter: blur(8px);
            background-color: rgba(var(--bg-rgb), 0.9);
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 800;
            font-size: 1.6rem;
            letter-spacing: 2px;
            color: var(--primary);
        }
        .brand img {
            width: 40px;
            height: 40px;
            filter: drop-shadow(0 0 2px var(--primary));
        }
        .user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid var(--primary);
            cursor: pointer;
            object-fit: cover;
            background: #2a2a3a;
        }

        /* PANELES */
        .panels-container {
            display: flex;
            gap: 30px;
            width: 100%;
        }
        .panel-izquierdo {
            flex: 1.1;
            min-width: 320px;
        }
        .panel-derecho {
            flex: 2;
            min-width: 400px;
            max-height: calc(100vh - 130px);
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--scroll-thumb) var(--card);
            padding-right: 6px;
        }
        .panel-derecho::-webkit-scrollbar {
            width: 6px;
        }
        .panel-derecho::-webkit-scrollbar-track {
            background: var(--card);
            border-radius: 10px;
        }
        .panel-derecho::-webkit-scrollbar-thumb {
            background: var(--scroll-thumb);
            border-radius: 10px;
        }

        @media (max-width: 900px) {
            .app-wrapper { padding: 0 0 100px 0; }
            .main-header { margin-left: 20px; margin-right: 20px; }
            .panels-container {
                display: flex;
                flex-direction: row;
                flex-wrap: nowrap;
                overflow-x: auto;
                scroll-snap-type: x mandatory;
                scroll-behavior: smooth;
                -webkit-overflow-scrolling: touch;
                gap: 0;
                scrollbar-width: none;
            }
            .panels-container::-webkit-scrollbar { display: none; }
            .panel-izquierdo, .panel-derecho {
                flex: 0 0 100%;
                scroll-snap-align: start;
                min-width: 100%;
                padding: 0 20px;
            }
            .panel-derecho { max-height: calc(100vh - 120px); }
            .brand span { font-size: 1.3rem; }
            .user-avatar { width: 42px; height: 42px; }
        }

        /* Tarjetas */
        .progreso-card, .stats-card {
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 32px;
            padding: 28px 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            text-align: center;
            margin-bottom: 24px;
        }
        .stats-card {
            text-align: left;
        }
        .stats-card h3 {
            font-size: 1.2rem;
            color: var(--primary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-left: 4px solid var(--primary);
            padding-left: 16px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }
        .stat-item {
            background: var(--stat-bg);
            border-radius: 20px;
            padding: 14px;
        }
        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
        }
        .stat-value {
            font-weight: 800;
            font-size: 1.2rem;
            margin-top: 6px;
            word-break: break-word;
            color: var(--primary);
        }
        .progreso-card h2 {
            font-size: 1.1rem;
            letter-spacing: 4px;
            color: var(--primary);
            margin-bottom: 10px;
        }
        .estrellas {
            font-size: 2rem;
            color: var(--star-color);
            letter-spacing: 4px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            gap: 5px;
        }
        .star-filled, .star-half, .star-empty {
            display: inline-block;
            width: 1.2em;
            text-align: center;
        }
        .star-empty {
            color: var(--text-dim);
        }
        .circulo-progreso {
            width: 200px;
            height: 200px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background: var(--card);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 0 20px var(--accent-glow);
            border: 3px solid var(--primary);
            overflow: hidden;
        }
        .circulo-progreso canvas {
            position: relative;
            z-index: 2;
            width: 100% !important;
            height: 100% !important;
        }
        .deco-inside {
            position: absolute;
            width: 140px;
            height: 140px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.25;
            pointer-events: none;
            z-index: 1;
        }
        .deco-inside svg {
            width: 100%;
            height: 100%;
            animation: spinSlow 20s infinite linear;
        }
        .deco-inside svg circle,
        .deco-inside svg path {
            stroke: var(--primary);
            fill: var(--primary);
        }
        @keyframes spinSlow {
            100% { transform: rotate(360deg); }
        }
        .progress-percent {
            position: absolute;
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text);
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            padding: 4px 14px;
            border-radius: 60px;
            border: 1px solid var(--primary);
            z-index: 3;
        }
        .monto-total {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
            margin: 10px 0 20px;
        }
        .btn-mision {
            background: var(--primary);
            color: var(--bg);
            border: none;
            padding: 14px 20px;
            border-radius: 60px;
            font-weight: 800;
            font-size: 0.95rem;
            cursor: pointer;
            width: 100%;
            transition: 0.05s linear;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-mision:active { transform: scale(0.98); }

        /* Metas */
        .mission-list { display: flex; flex-direction: column; gap: 18px; }
        .mission-card {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 20px 22px;
            border-radius: 28px;
        }
        .mission-card.completed {
            border: 2px solid var(--primary);
            background: var(--stat-bg);
        }
        .m-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .m-name {
            font-weight: 700;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .badge-complete {
            background: var(--primary);
            color: var(--bg);
            font-size: 0.7rem;
            padding: 4px 14px;
            border-radius: 30px;
            font-weight: bold;
        }
        .prog-bar {
            height: 10px;
            background: var(--text-dim);
            border-radius: 20px;
            margin: 12px 0;
        }
        .prog-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 20px;
        }
        .m-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 14px;
        }
        .m-actions input {
            flex: 2;
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 12px 14px;
            border-radius: 24px;
            color: var(--text);
            font-family: inherit;
        }
        .m-actions button {
            flex: 1;
            padding: 12px 8px;
            border-radius: 40px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            background: var(--primary);
            color: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .btn-secondary { background: var(--text-dim) !important; color: var(--bg) !important; }

        /* Navegación */
        .nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            max-width: 90%;
            background: var(--nav-bg);
            backdrop-filter: blur(18px);
            border: 2px solid var(--primary);
            border-radius: 60px;
            display: flex;
            justify-content: space-around;
            padding: 12px 20px;
            z-index: 1000;
        }
        .nav-item {
            background: none;
            border: none;
            color: var(--text);
            font-weight: 600;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 0.7rem;
            cursor: pointer;
        }
        .nav-item svg {
            width: 22px;
            height: 22px;
            stroke: var(--text);
            fill: none;
            stroke-width: 1.5;
        }

        /* Modales */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .modal.show { display: flex; }
        .modal-body {
            background: var(--card);
            width: 100%;
            max-width: 450px;
            border-radius: 48px;
            padding: 28px;
            border: 2px solid var(--primary);
            max-height: 85vh;
            overflow-y: auto;
        }
        .input-field {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 30px;
            color: var(--text);
            margin-bottom: 16px;
            font-size: 1rem;
        }
        .btn-action {
            background: var(--primary);
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-weight: 800;
            cursor: pointer;
            color: var(--bg);
            width: 100%;
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-secondary { background: var(--text-dim) !important; color: var(--bg) !important; }
        .toast-notify {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--toast-bg);
            padding: 12px 28px;
            border-radius: 60px;
            color: var(--primary);
            font-weight: 600;
            z-index: 3000;
            opacity: 0;
            transition: 0.2s;
            border: 1px solid var(--primary);
            pointer-events: none;
            white-space: nowrap;
        }
        .blur-val { filter: blur(5px); }
        hr { border-color: var(--border); margin: 16px 0; }
        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        .avatar-edit-icon {
            position: relative;
            cursor: pointer;
        }
        .edit-pen {
            position: absolute;
            bottom: 0;
            right: 0;
            background: var(--primary);
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--card);
            color: var(--bg);
        }
        .setting-item {
            margin: 12px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .color-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid var(--border);
        }
        /* Intro animada */
        .intro-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease;
        }
        .intro-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            background: var(--card);
            padding: 40px 60px;
            border-radius: 80px;
            border: 3px solid var(--primary);
            animation: pulse 1.2s ease-in-out infinite alternate;
        }
        @keyframes pulse {
            0% { transform: scale(0.98); opacity: 0.9; box-shadow: 0 0 0 0 var(--primary); }
            100% { transform: scale(1.02); opacity: 1; box-shadow: 0 0 20px 10px var(--primary); }
        }
        .intro-content img {
            width: 80px;
            height: 80px;
            animation: spin 1s ease-out;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .intro-content span {
            font-size: 2.8rem;
            font-weight: 800;
            color: var(--primary);
        }
    </style>
</head>
<body>

<div id="intro-overlay" class="intro-overlay" style="opacity:1;">
    <div class="intro-content">
        <img src="https://cdn-icons-png.flaticon.com/512/2489/2489756.png" alt="logo">
        <span>WEALTHFLOW</span>
    </div>
</div>

<div class="app-wrapper" id="appContainer" style="display: none;">
    <header class="main-header">
        <div class="brand">
            <img src="https://cdn-icons-png.flaticon.com/512/2489/2489756.png" alt="logo">
            <span>WEALTHFLOW</span>
        </div>
        <img id="head-avatar" src="https://api.dicebear.com/7.x/bottts/svg?seed=1" class="user-avatar" onclick="openModal('modal-profile')">
    </header>

    <div class="panels-container">
        <section class="panel-izquierdo">
            <div class="progreso-card">
                <h2>PROGRESO TOTAL</h2>
                <div id="stars-container" class="estrellas">★★★★★</div>
                <div class="circulo-progreso">
                    <canvas id="progressChart" width="200" height="200"></canvas>
                    <div class="deco-inside" id="decoInside">
                        <svg viewBox="0 0 100 100">
                            <circle cx="50" cy="50" r="45" stroke="var(--primary)" stroke-width="2" fill="none" stroke-dasharray="4 4"/>
                            <path d="M50 20 L58 38 L78 40 L63 53 L68 73 L50 62 L32 73 L37 53 L22 40 L42 38 Z" fill="var(--primary)"/>
                        </svg>
                    </div>
                    <div id="progress-percent" class="progress-percent">0%</div>
                </div>
                <div id="total-val" class="monto-total">$ 0,00</div>
                <button class="btn-mision" id="createMissionBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
                    CREAR NUEVA MISIÓN
                </button>
            </div>

            <div class="stats-card" id="statsPanel">
                <h3>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 12v3a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4v-3M12 2v8m0 0-3-3m3 3 3-3"/><path d="M3 18h18"/></svg>
                    ESTADÍSTICAS AVANZADAS
                </h3>
                <div class="stats-grid" id="statsGrid"></div>
            </div>
        </section>

        <section class="panel-derecho">
            <div id="mission-list" class="mission-list"></div>
        </section>
    </div>
</div>

<nav class="nav" id="navBar" style="display: none;">
    <button class="nav-item" onclick="openModal('modal-history')">
        <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/><circle cx="12" cy="12" r="3"/></svg>
        <span>HISTORIAL</span>
    </button>
    <button class="nav-item" onclick="toggleFullscreen()">
        <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
        <span>PANTALLA</span>
    </button>
    <button class="nav-item" onclick="openThemeModal()">
        <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H5.78a1.65 1.65 0 0 0-1.51 1 1.65 1.65 0 0 0 .33 1.82l.03.03A10 10 0 0 0 12 17.66a10 10 0 0 0 6.37-2.63z"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2"/></svg>
        <span>TEMA</span>
    </button>
</nav>

<!-- MODALES -->
<div id="modal-mission" class="modal"><div class="modal-body"><h2 style="color:var(--primary);">Nueva Misión</h2><input id="m-name" class="input-field" placeholder="Ej: Viaje a Europa"><input id="m-goal" class="input-field" placeholder="Meta $ 0,00" oninput="maskCurrency(this)"><button class="btn-action" id="confirmCreateMission">CREAR MISIÓN</button><button class="btn-action btn-secondary" onclick="closeModals()">Cancelar</button></div></div>
<div id="modal-profile" class="modal"><div class="modal-body"><div class="profile-header"><div class="avatar-edit-icon" onclick="tryEditAvatar()"><img id="profile-img" src="" style="width:70px;height:70px;border-radius:50%;border:3px solid var(--primary);"><div class="edit-pen">✎</div></div><div class="profile-name" id="profileUserName">Inversor</div></div><input id="user-name" class="input-field" placeholder="Tu nombre"><hr><h4>Ajustes</h4><div class="setting-item"><span>Modo privado</span> <input type="checkbox" id="priv-toggle"></div><div class="setting-item"><span>Desactivar animaciones</span> <input type="checkbox" id="disable-animations-toggle"></div><div class="setting-item"><span>Contraseña de acceso</span> <button class="btn-action btn-secondary" style="width:auto; padding:6px 16px;" onclick="showPasswordModal()">Configurar</button></div><hr><button class="btn-action btn-secondary" onclick="clearHistory()">Limpiar historial</button><button class="btn-action btn-secondary" onclick="showResetConfirm()">Resetear todo</button><button class="btn-action btn-secondary" onclick="exportData()">Exportar datos</button><button class="btn-action btn-secondary" onclick="document.getElementById('import-file').click()">Importar datos</button><input type="file" id="import-file" style="display:none" onchange="importData(event)"><button class="btn-action" onclick="saveUser()">GUARDAR CAMBIOS</button></div></div>
<div id="modal-history" class="modal"><div class="modal-body"><h3>Historial de movimientos</h3><div id="hist-box" style="max-height:350px;overflow-y:auto;margin:20px 0;"></div><button class="btn-action btn-secondary" onclick="closeModals()">CERRAR</button></div></div>
<div id="modal-theme" class="modal"><div class="modal-body"><h3>Selecciona un tema</h3><div style="display:flex;gap:12px;flex-wrap:wrap;margin:20px 0;justify-content:center;" id="theme-buttons"></div><button class="btn-action btn-secondary" onclick="closeModals()">CERRAR</button></div></div>
<div id="modal-confirm" class="modal"><div class="modal-body"><h3 id="confirm-title">Confirmar</h3><p id="confirm-message"></p><div style="display:flex; gap:12px; margin-top:20px;"><button class="btn-action" id="confirm-yes">Sí</button><button class="btn-action btn-secondary" id="confirm-no">Cancelar</button></div></div></div>
<div id="modal-prompt" class="modal"><div class="modal-body"><h3 id="prompt-title"></h3><input type="text" id="prompt-input" class="input-field"><div style="display:flex; gap:12px;"><button class="btn-action" id="prompt-ok">Aceptar</button><button class="btn-action btn-secondary" id="prompt-cancel">Cancelar</button></div></div></div>

<div id="toast-msg" class="toast-notify"></div>

<script>
    (function(){
        let data = JSON.parse(localStorage.getItem('wf_v13')) || { missions: [], history: [], user: { name: 'Inversor', img: 'https://api.dicebear.com/7.x/bottts/svg?seed=1', private: false, theme: 'dark', lastAvatarChange: 0, disableAnimations: false, password: '' } };
        data.missions = data.missions.filter(m => m && typeof m.id === 'number');
        if(!data.user.lastAvatarChange) data.user.lastAvatarChange = 0;
        if(data.user.disableAnimations === undefined) data.user.disableAnimations = false;
        let chartObj = null;

        const appContainer = document.getElementById('appContainer');
        const navBar = document.getElementById('navBar');
        const introOverlay = document.getElementById('intro-overlay');

        // Mostrar intro solo si no hay sesión (sessionStorage vacío)
        if(!sessionStorage.getItem('wf_intro_shown')) {
            sessionStorage.setItem('wf_intro_shown', '1');
            setTimeout(() => {
                introOverlay.style.opacity = '0';
                setTimeout(() => {
                    introOverlay.style.display = 'none';
                    checkPasswordAndStart();
                }, 800);
            }, 2000);
        } else {
            introOverlay.style.display = 'none';
            checkPasswordAndStart();
        }

        function showToast(msg, err){ const t=document.getElementById('toast-msg'); t.style.color=err?'#ffaaaa':'var(--primary)'; t.innerText=msg; t.style.opacity='1'; setTimeout(()=>t.style.opacity='0',2200); }
        function fmt(n){ return new Intl.NumberFormat('de-DE',{minimumFractionDigits:2}).format(n); }
        function parse(str){ let v = str.replace(/\./g,'').replace(',','.'); return parseFloat(v)||0; }
        window.maskCurrency = function(el){ let v=el.value.replace(/\D/g,''); if(v===''){el.value='';return;} let num = (parseInt(v)/100).toFixed(2); el.value = num.replace('.',','); };
        function addHistory(msg){ data.history.unshift({m:msg.replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])), t:new Date().toLocaleTimeString()}); if(data.history.length>100) data.history.pop(); }
        function save(){ localStorage.setItem('wf_v13', JSON.stringify(data)); render(); }

        function confirmCustom(message, onYes) {
            const modal = document.getElementById('modal-confirm');
            document.getElementById('confirm-message').innerText = message;
            modal.classList.add('show');
            const yesBtn = document.getElementById('confirm-yes');
            const noBtn = document.getElementById('confirm-no');
            const handler = (fn) => { modal.classList.remove('show'); fn(); };
            const newYes = () => { handler(onYes); cleanup(); };
            const newNo = () => { handler(()=>{}); cleanup(); };
            function cleanup() { yesBtn.removeEventListener('click', newYes); noBtn.removeEventListener('click', newNo); }
            yesBtn.addEventListener('click', newYes);
            noBtn.addEventListener('click', newNo);
        }
        function promptCustom(title, defaultValue, callback) {
            const modal = document.getElementById('modal-prompt');
            document.getElementById('prompt-title').innerText = title;
            const input = document.getElementById('prompt-input');
            input.value = defaultValue !== undefined ? defaultValue : '';
            modal.classList.add('show');
            const okBtn = document.getElementById('prompt-ok');
            const cancelBtn = document.getElementById('prompt-cancel');
            const cleanup = () => {
                okBtn.removeEventListener('click', okHandler);
                cancelBtn.removeEventListener('click', cancelHandler);
                modal.classList.remove('show');
            };
            const okHandler = () => { callback(input.value); cleanup(); };
            const cancelHandler = () => { callback(null); cleanup(); };
            okBtn.addEventListener('click', okHandler);
            cancelBtn.addEventListener('click', cancelHandler);
        }

        function computeStats() {
            let maxDeposit = 0, maxWithdraw = 0;
            let missionMostMoney = null, missionHighestGoal = null, missionLowestGoal = null, missionMostTransactions = null;
            let completedCount = 0;
            let highestProbability = null;
            const transactionCount = new Map();
            data.missions.forEach(m => {
                if(m.current >= m.goal) completedCount++;
                const percent = m.goal > 0 ? (m.current / m.goal) * 100 : 0;
                if(percent < 100 && (!highestProbability || percent > highestProbability.percent)) highestProbability = { name: m.name, percent: percent };
                if(m.current > (missionMostMoney?.current || 0)) missionMostMoney = m;
                if(m.goal > (missionHighestGoal?.goal || 0)) missionHighestGoal = m;
                if(!missionLowestGoal || m.goal < missionLowestGoal.goal) missionLowestGoal = m;
                let count = 0;
                data.history.forEach(h => { if(h.m.includes(m.name)) count++; });
                transactionCount.set(m.id, count);
                if(count > (transactionCount.get(missionMostTransactions?.id) || 0)) missionMostTransactions = m;
            });
            data.history.forEach(h => {
                const matchAdd = h.m.match(/Abono \$([\d.,]+)/);
                const matchWith = h.m.match(/Retiro \$([\d.,]+)/);
                if(matchAdd) { let val = parse(matchAdd[1]); if(val > maxDeposit) maxDeposit = val; }
                if(matchWith) { let val = parse(matchWith[1]); if(val > maxWithdraw) maxWithdraw = val; }
            });
            return { maxDeposit, maxWithdraw, missionMostMoney, missionHighestGoal, missionLowestGoal, missionMostTransactions, completedCount, highestProbability };
        }
        function renderStats() {
            const stats = computeStats();
            const container = document.getElementById('statsGrid');
            if(!container) return;
            if(data.user.private){
                container.innerHTML = `<div class="stat-item"><div class="stat-label">DATOS OCULTOS</div><div class="stat-value">••••••</div></div>`;
                return;
            }
            container.innerHTML = `
                <div class="stat-item"><div class="stat-label">MÁXIMO ABONO</div><div class="stat-value">$${fmt(stats.maxDeposit)}</div></div>
                <div class="stat-item"><div class="stat-label">MÁXIMO RETIRO</div><div class="stat-value">$${fmt(stats.maxWithdraw)}</div></div>
                <div class="stat-item"><div class="stat-label">MISIÓN + AHORRADA</div><div class="stat-value">${stats.missionMostMoney ? stats.missionMostMoney.name : '—'} ($${fmt(stats.missionMostMoney?.current||0)})</div></div>
                <div class="stat-item"><div class="stat-label">MISIÓN + COSTOSA</div><div class="stat-value">${stats.missionHighestGoal ? stats.missionHighestGoal.name : '—'} ($${fmt(stats.missionHighestGoal?.goal||0)})</div></div>
                <div class="stat-item"><div class="stat-label">MISIÓN - COSTOSA</div><div class="stat-value">${stats.missionLowestGoal ? stats.missionLowestGoal.name : '—'} ($${fmt(stats.missionLowestGoal?.goal||0)})</div></div>
                <div class="stat-item"><div class="stat-label">MÁS MOVIMIENTOS</div><div class="stat-value">${stats.missionMostTransactions ? stats.missionMostTransactions.name : '—'}</div></div>
                <div class="stat-item"><div class="stat-label">MISIONES COMPLETADAS</div><div class="stat-value">${stats.completedCount} / ${data.missions.length}</div></div>
                <div class="stat-item"><div class="stat-label">MAYOR PROBABILIDAD</div><div class="stat-value">${stats.highestProbability ? `${stats.highestProbability.name} (${Math.round(stats.highestProbability.percent)}%)` : '—'}</div></div>
            `;
        }

        function applyTheme(th){
            document.body.className = '';
            if(th === 'light') document.body.classList.add('light-mode');
            else if(th === 'blue') document.body.classList.add('theme-blue');
            else if(th === 'purple') document.body.classList.add('theme-purple');
            else if(th === 'pink') document.body.classList.add('theme-pink');
            else if(th === 'red') document.body.classList.add('theme-red');
            else if(th === 'orange') document.body.classList.add('theme-orange');
            else document.body.classList.add('dark-mode');
            data.user.theme = th;
            save();
            updateDecorInsideColor();
            if(chartObj) updateChart(getTotals().saved, getTotals().goal);
            renderStats();
        }
        function updateDecorInsideColor(){
            const svgPath = document.querySelector('#decoInside svg path');
            const svgCircle = document.querySelector('#decoInside svg circle');
            const primaryColor = getComputedStyle(document.body).getPropertyValue('--primary').trim();
            if(svgPath) svgPath.setAttribute('fill', primaryColor);
            if(svgCircle) svgCircle.setAttribute('stroke', primaryColor);
        }
        function getTotals(){ let s=0,g=0; data.missions.forEach(m=>{ s+=m.current; g+=m.goal; }); return {saved:s, goal:g}; }
        function updateChart(totalSaved, totalGoal){
            const ctx = document.getElementById('progressChart').getContext('2d');
            const percent = totalGoal>0 ? Math.min((totalSaved/totalGoal)*100,100) : 0;
            document.getElementById('progress-percent').innerText = Math.round(percent)+'%';
            renderStars(percent);
            if(chartObj) chartObj.destroy();
            const primaryColor = getComputedStyle(document.body).getPropertyValue('--primary').trim();
            chartObj = new Chart(ctx, { type:'doughnut', data:{ datasets:[{ data:[totalSaved, Math.max(totalGoal-totalSaved,0)], backgroundColor:[primaryColor, '#333333'], borderWidth:0 }] }, options:{ cutout:'72%', plugins:{ tooltip:{ callbacks:{ label:(c)=>`${c.label}: $${fmt(c.raw)}` } } } } });
        }
        function renderStars(percent){
            const starsContainer = document.getElementById('stars-container');
            const maxStars = 5;
            const starValue = percent / 20;
            let html = '';
            for (let i=1;i<=maxStars;i++){
                if(starValue >= i) html += '<span class="star-filled">★</span>';
                else if(starValue >= i-0.5) html += '<span class="star-half">⯨</span>';
                else html += '<span class="star-empty">☆</span>';
            }
            starsContainer.innerHTML = html;
        }
        function render(){
            const listDiv = document.getElementById('mission-list');
            let totals = getTotals();
            listDiv.innerHTML = '';
            data.missions.forEach(m=>{
                const percent = m.goal>0 ? Math.min((m.current/m.goal)*100,100) : 0;
                const blurClass = data.user.private ? 'blur-val' : '';
                const remaining = m.goal - m.current;
                const completed = m.current >= m.goal;
                const card = document.createElement('div'); card.className = `mission-card ${completed ? 'completed' : ''}`;
                card.innerHTML = `<div class="m-header"><div class="m-name">${m.name} ${completed?'<span class="badge-complete">✓ COMPLETADA</span>':''} <span style="cursor:pointer;" onclick="editMissionGoal(${m.id})">✎</span></div><button onclick="deleteMission(${m.id})" style="background:none;border:none;color:#ff8888;cursor:pointer;">🗑</button></div><div class="m-reach ${blurClass}">💰 $ ${fmt(m.current)} de $ ${fmt(m.goal)}</div><div class="remaining ${blurClass}">${remaining>0?`⏳ Faltan $${fmt(remaining)}`:'🎉 Meta alcanzada'}</div><div class="prog-bar"><div class="prog-fill" style="width:${percent}%"></div></div><div class="m-actions"><input id="in-${m.id}" oninput="maskCurrency(this)" placeholder="$ 0,00"><button onclick="addMoney(${m.id})"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 5v14M5 12h14"/></svg> AGREGAR</button><button class="btn-secondary" onclick="withdrawMoney(${m.id})"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M5 12h14"/></svg> RETIRAR</button></div>`;
                listDiv.appendChild(card);
            });
            const totalEl = document.getElementById('total-val');
            if(data.user.private){ totalEl.innerText = '••••••'; totalEl.classList.add('blur-val'); }
            else { totalEl.innerText = `$ ${fmt(totals.saved)}`; totalEl.classList.remove('blur-val'); }
            document.getElementById('head-avatar').src = data.user.img;
            document.getElementById('profile-img').src = data.user.img;
            document.getElementById('user-name').value = data.user.name;
            document.getElementById('profileUserName').innerText = data.user.name;
            document.getElementById('priv-toggle').checked = data.user.private;
            document.getElementById('disable-animations-toggle').checked = data.user.disableAnimations;
            updateHistoryPanel();
            updateChart(totals.saved, totals.goal);
            renderStats();
            const deco = document.getElementById('decoInside');
            if(data.user.disableAnimations) deco.style.animation = 'none';
            else deco.style.animation = '';
        }
        function updateHistoryPanel(){
            const box = document.getElementById('hist-box');
            if(!data.history.length){ box.innerHTML='<p style="color:var(--text-dim);">Sin movimientos</p>'; return; }
            box.innerHTML = data.history.map(e=>`<div style="padding:12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between"><span>${e.m}</span><span>${e.t}</span></div>`).join('');
        }
        window.tryEditAvatar = function(){
            const now = Date.now();
            const last = data.user.lastAvatarChange || 0;
            const daysDiff = (now - last) / (1000*3600*24);
            if(daysDiff < 7 && last !== 0){ showToast(`Puedes cambiar la foto en ${Math.ceil(7-daysDiff)} día(s)`, true); return; }
            document.getElementById('upload').click();
        };
        window.uploadImage = function(i){
            const f=i.files[0]; if(!f) return;
            const r=new FileReader();
            r.onload=e=>{ data.user.img=e.target.result; data.user.lastAvatarChange=Date.now(); save(); showToast('Foto actualizada'); };
            r.readAsDataURL(f);
        };
        window.saveUser = function(){
            let n = document.getElementById('user-name').value.trim();
            if(n) data.user.name = n.substring(0,30);
            data.user.private = document.getElementById('priv-toggle').checked;
            data.user.disableAnimations = document.getElementById('disable-animations-toggle').checked;
            save(); closeModals(); showToast('Ajustes guardados');
        };
        window.setTheme = (th)=>{ applyTheme(th); closeModals(); };
        window.openThemeModal = ()=>{
            const container = document.getElementById('theme-buttons');
            const themes = [
                { name: 'dark', color: '#000000', label: 'Negro' },
                { name: 'light', color: '#ffffff', label: 'Blanco' },
                { name: 'blue', color: '#1e88e5', label: 'Azul' },
                { name: 'purple', color: '#9d4edd', label: 'Morado' },
                { name: 'pink', color: '#f472b6', label: 'Rosa' },
                { name: 'red', color: '#ef4444', label: 'Rojo' },
                { name: 'orange', color: '#f97316', label: 'Naranja' }
            ];
            container.innerHTML = themes.map(th => `<div class="color-circle" style="background:${th.color}; border:2px solid var(--border);" title="${th.label}" onclick="setTheme('${th.name}')"></div>`).join('');
            document.getElementById('modal-theme').classList.add('show');
        };
        window.openMissionModal = ()=> document.getElementById('modal-mission').classList.add('show');
        window.createMission = function(){
            let name = document.getElementById('m-name').value.trim();
            let goal = parse(document.getElementById('m-goal').value);
            if(!name || goal<=0){ showToast('Nombre y meta mayor a 0', true); return; }
            data.missions.push({ id:Date.now(), name, goal, current:0 });
            addHistory(`Misión "${name}" creada ($${fmt(goal)})`);
            document.getElementById('m-name').value=''; document.getElementById('m-goal').value='';
            closeModals(); save();
        };
        window.addMoney = function(id){
            const m = data.missions.find(x=>x.id===id); const inp = document.getElementById(`in-${id}`); let amt = parse(inp.value);
            if(amt<=0){ showToast('Monto inválido', true); return; }
            let maxAdd = m.goal - m.current;
            if(amt > maxAdd && maxAdd>0){ confirmCustom(`Solo faltan $${fmt(maxAdd)}. ¿Agregar ese monto?`, ()=>{ amt = maxAdd; m.current += amt; addHistory(`Abono $${fmt(amt)} a "${m.name}"`); inp.value=''; save(); }); return; }
            m.current += amt; addHistory(`Abono $${fmt(amt)} a "${m.name}"`); inp.value=''; save();
        };
        window.withdrawMoney = function(id){
            const m = data.missions.find(x=>x.id===id); const inp = document.getElementById(`in-${id}`); let amt = parse(inp.value);
            if(amt<=0 || amt>m.current){ showToast(`Máximo $${fmt(m.current)}`, true); return; }
            m.current -= amt; addHistory(`Retiro $${fmt(amt)} de "${m.name}"`); inp.value=''; save();
        };
        window.deleteMission = function(id){
            const m = data.missions.find(x=>x.id===id);
            confirmCustom(`¿Eliminar "${m.name}"?`, ()=>{ data.missions = data.missions.filter(x=>x.id!==id); addHistory(`Misión eliminada "${m.name}"`); save(); });
        };
        window.editMissionGoal = function(id){
            const m = data.missions.find(x=>x.id===id);
            promptCustom(`Nueva meta para "${m.name}"`, fmt(m.goal), (val)=>{
                if(val && parse(val) > m.current){ m.goal = parse(val); addHistory(`Meta de "${m.name}" actualizada`); save(); }
                else if(val) showToast('La meta debe ser mayor al ahorro actual', true);
            });
        };
        window.clearHistory = ()=>{ confirmCustom('¿Limpiar todo el historial?', ()=>{ data.history=[]; addHistory('Historial limpiado'); save(); }); };
        window.showResetConfirm = ()=>{ confirmCustom('⚠️ RESETEO TOTAL: se perderán todas las misiones. ¿Continuar?', ()=>{ data = { missions:[], history:[], user:{...data.user, private:data.user.private, theme:data.user.theme, img:data.user.img, name:data.user.name, lastAvatarChange:data.user.lastAvatarChange, disableAnimations:data.user.disableAnimations, password:data.user.password } }; save(); }); };
        window.exportData = ()=>{ const b=new Blob([JSON.stringify(data)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='wealthflow_backup.json'; a.click(); showToast('Exportado'); };
        window.importData = (e)=>{ const f=e.target.files[0]; if(!f) return; const r=new FileReader(); r.onload=ev=>{ try{ data=JSON.parse(ev.target.result); if(!data.user) data.user={}; applyTheme(data.user.theme||'dark'); save(); showToast('Importado'); }catch{showToast('Error',true);} e.target.value=''; }; r.readAsText(f); };
        window.toggleFullscreen = ()=> document.fullscreenElement? document.exitFullscreen() : document.documentElement.requestFullscreen();
        window.openModal = id=> document.getElementById(id).classList.add('show');
        window.closeModals = ()=> document.querySelectorAll('.modal').forEach(m=>m.classList.remove('show'));
        window.showPasswordModal = ()=>{
            promptCustom('Nueva contraseña (dejar vacío para eliminar)', '', (newPass)=>{
                data.user.password = newPass || '';
                save();
                showToast(newPass ? 'Contraseña establecida' : 'Contraseña eliminada');
            });
        };
        function checkPasswordAndStart(){
            if(data.user.password && data.user.password !== ''){
                const modalPass = document.createElement('div'); modalPass.className='modal show'; modalPass.innerHTML=`<div class="modal-body"><h3>Ingrese contraseña</h3><input type="password" id="tempPassInput" class="input-field"><button class="btn-action" onclick="window.verifyTempPass()">Acceder</button></div>`;
                document.body.appendChild(modalPass);
                window.verifyTempPass = ()=>{
                    const val = document.getElementById('tempPassInput').value;
                    if(val === data.user.password){ modalPass.remove(); showApp(); }
                    else { showToast('Contraseña incorrecta', true); }
                };
            } else { showApp(); }
        }
        function showApp(){
            appContainer.style.display = 'block';
            navBar.style.display = 'flex';
            applyTheme(data.user.theme);
            render();
        }
        const hiddenInput = document.createElement('input'); hiddenInput.type='file'; hiddenInput.id='upload'; hiddenInput.style.display='none'; hiddenInput.accept='image/*'; hiddenInput.onchange=(e)=>window.uploadImage(e.target);
        document.body.appendChild(hiddenInput);
        document.getElementById('confirmCreateMission').addEventListener('click', ()=> window.createMission());
        document.getElementById('createMissionBtn').addEventListener('click', ()=> window.openMissionModal());
    })();
</script>
</body>
</html>
